<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan '26 Dashboard</title>
    
    <!-- Tailwind CSS (Styling System) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Your Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-stone-50 text-stone-800 h-screen flex flex-col max-w-md mx-auto border-x border-gray-200 shadow-2xl">

    <!-- HEADER -->
    <header class="bg-gradient-to-b from-red-700 to-red-600 text-white p-5 shadow-lg shrink-0 z-20 sticky top-0">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-black tracking-tight">🇯🇵 JAPAN '26</h1>
                <p class="text-red-100 text-xs font-medium opacity-90">Operations Dashboard</p>
            </div>
            <div class="text-xs bg-red-800/50 px-3 py-1.5 rounded-lg border border-red-500/30 backdrop-blur-sm font-mono">
                12 DAYS
            </div>
        </div>

        <!-- Squad Selector (Filled by JS) -->
        <div class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1 scrollbar-hide" id="squad-selector"></div>
    </header>

    <!-- MAIN TIMELINE (Filled by JS) -->
    <main class="flex-1 overflow-y-auto bg-stone-50" id="timeline-container"></main>

    <!-- FOOTER -->
    <footer class="bg-white border-t border-gray-200 p-3 flex justify-around text-[10px] font-bold uppercase text-gray-400 shrink-0 z-20">
        <div class="flex flex-col items-center gap-1 text-red-600">
            <i data-lucide="calendar" class="w-5 h-5"></i>
            <span>Timeline</span>
        </div>
        <div class="flex flex-col items-center gap-1 hover:text-stone-600 cursor-pointer transition-colors">
            <i data-lucide="ticket" class="w-5 h-5"></i>
            <span>Bookings</span>
        </div>
        <div class="flex flex-col items-center gap-1 hover:text-stone-600 cursor-pointer transition-colors">
            <i data-lucide="info" class="w-5 h-5"></i>
            <span>Guide</span>
        </div>
    </footer>

    <!-- Your Custom Logic -->
    <script src="script.js"></script>
</body>
</html>
